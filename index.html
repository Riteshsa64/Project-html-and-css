<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Japan Flag</title>
  <link rel="stylesheet" href="./style.css">
  <style>
    /* Center the flag on screen */
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #e0e0e0; /* light gray background */
    }
    /* Flag box */
    .flag {
      width: 300px;
      height: 200px;
      background-color: white; /* flag background */
      border: 2px solid black;
      display: flex;
      justify-content: center;
      align-items: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    /* Red circle (sun) */
    .circle {
      width: 80px;
      height: 80px;
      background-color: #bc002d; /* official red color of Japan flag */
      border-radius: 50%;
    }
  </style>
</head>
<body>
  <div class="flag">
    <div class="circle"></div>
  </div>
</body>
</html>
